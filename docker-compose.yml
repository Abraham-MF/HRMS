version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - HRMS:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.desarrollo
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      db:    {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/login/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker -l info -c 4 --uid=nobody --gid=nogroup
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.desarrollo
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:      {condition: service_healthy}
      redis:   {condition: service_healthy}
      backend: {condition: service_healthy}

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.desarrollo
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:      {condition: service_healthy}
      redis:   {condition: service_healthy}
      backend: {condition: service_healthy}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api/v1}
    expose:
      - "80"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  HRMS:
  redis_data:
  minio_data:
  static_files:
